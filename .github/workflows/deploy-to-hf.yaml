name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Enter the path of the app (e.g., "widgets-api/app") to deploy only that app, or "all" to deploy all apps.'
        required: true
        default: 'all'
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          # If manual dispatch is used and a specific app is named, use that.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.app_name }}" != "all" ]]; then
            APPS=$(echo '["${{ github.event.inputs.app_name }}"]' | jq -c .)
          # Otherwise, find all space.yaml files to determine which apps to deploy
          else
            APPS=$(find * -name "space.yaml" | xargs -n 1 dirname | jq -R -s -c 'split("\n")[:-1]')
          fi
          echo "matrix=$APPS" >> $GITHUB_OUTPUT

  deploy:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set deploy paths
        run: |
          echo "APP_DIR=${{ matrix.app }}" >> $GITHUB_ENV
          echo "MANIFEST_PATH=${{ matrix.app }}/space.yaml" >> $GITHUB_ENV
          echo "README_PATH=${{ matrix.app }}/README.md" >> $GITHUB_ENV

      - name: Skip unchanged app on push
        if: ${{ github.event_name == 'push' }}
        run: |
          if git diff --quiet HEAD^ HEAD -- "$APP_DIR"; then
            echo "No changes in $APP_DIR, skipping."
            exit 0
          fi

      - name: Extract Space ID
        run: |
          echo "SPACE_ID=$(yq e '.space_id' \"$MANIFEST_PATH\")" >> $GITHUB_ENV

      - name: Inject metadata into README frontmatter
        run: |
          if [ -f "$README_PATH" ]; then
            echo "Injecting configurations into $README_PATH..."
            # Extract existing frontmatter if it exists
            if grep -q '^---' "$README_PATH"; then
              # If frontmatter exists, extract it and merge with new metadata
              EXISTING_FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$README_PATH")
              echo "$EXISTING_FRONTMATTER" > temp_frontmatter.yaml
              yq e 'select(fileIndex == 0) * select(fileIndex == 1)' temp_frontmatter.yaml <(yq e 'del(.space_id)' "$MANIFEST_PATH") > merged_frontmatter.yaml
              # Replace old frontmatter with merged frontmatter
              sed -i '1,/^---$/d' "$README_PATH"
              echo "---" > temp_readme.md
              cat merged_frontmatter.yaml >> temp_readme.md
              echo "---" >> temp_readme.md
              cat "$README_PATH" >> temp_readme.md
              mv temp_readme.md "$README_PATH"
              rm temp_frontmatter.yaml merged_frontmatter.yaml
            else
              # If no frontmatter, simply add it at the top
              echo "---" > temp_readme.md
              yq e 'del(.space_id)' "$MANIFEST_PATH" >> temp_readme.md
              echo "---" >> temp_readme.md
              cat "$README_PATH" >> temp_readme.md
              mv temp_readme.md "$README_PATH"
            fi
          else
            echo "Warning: No README.md found in $APP_DIR. Creating one with frontmatter..."
            echo "---" > "$README_PATH"
            yq e 'del(.space_id)' "$MANIFEST_PATH" >> "$README_PATH"
            echo "---" >> "$README_PATH"
          fi

      - name: Commit injected metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$README_PATH"
          git commit -m "chore: inject HF metadata for $APP_DIR"

      - name: Push app subtree to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git subtree split --prefix=$APP_DIR -b deploy-branch
          git remote add target "https://user:$HF_TOKEN@huggingface.co/spaces/$SPACE_ID" || true
          git push target deploy-branch:main --force
          git branch -D deploy-branch